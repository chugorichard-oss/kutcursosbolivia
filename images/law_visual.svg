        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#gradLaw)" opacity="0.3" />
  <g filter="url(#glowIndigo)">
    <path d="M60 140 Q100 0 140 140 Q100 160 60 140 Z" fill="none" stroke="#6366f1" stroke-width="2.5" />
    <circle cx="100" cy="80" r="30" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5 5" />
    <path d="M80 80 H120 M100 60 V100" stroke="#6366f1" stroke-width="2" />
    <circle cx="100" cy="80" r="10" fill="#6366f1" opacity="0.9" />
  </g>
</svg>
